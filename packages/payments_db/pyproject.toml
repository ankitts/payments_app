[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "payments-db"
version = "0.1.0"
description = "Shared SQLAlchemy models for payments services"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.49",
]

[tool.hatch.build.targets.wheel]
packages = ["payments_db"]
